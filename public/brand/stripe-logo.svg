<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    EliteVault — Stripe-ready brand logo (512×512).

    Versión refinada del icon.svg pensada para upload en Stripe Dashboard:
      • 512x512 (Stripe pide mínimo 128×128, 512 es safe para Retina)
      • Padding generoso para que el mark no toque los bordes
      • Stroke más grueso que el favicon — se ve mejor a tamaño grande
      • Glow doble (gold + teal) que da profundidad sin saturar

    Subir a: dashboard.stripe.com/settings/branding
      → Brand assets → Logo
      → Brand assets → Icon (mismo archivo)
  -->

  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FFF8E1"/>
      <stop offset="0.5" stop-color="#D4AF37"/>
      <stop offset="1" stop-color="#8A6A1A"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#14B8A6"/>
      <stop offset="1" stop-color="#5EEAD4"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="rgba(212,175,55,0.22)"/>
      <stop offset="0.6" stop-color="rgba(212,175,55,0.08)"/>
      <stop offset="1" stop-color="rgba(212,175,55,0)"/>
    </radialGradient>
    <radialGradient id="signalGlow" cx="0.5" cy="0.55" r="0.35">
      <stop offset="0" stop-color="rgba(45,212,191,0.30)"/>
      <stop offset="1" stop-color="rgba(45,212,191,0)"/>
    </radialGradient>
  </defs>

  <!-- Obsidian background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="#0A0A0F"/>

  <!-- Outer gold glow -->
  <rect width="512" height="512" rx="96" fill="url(#goldGlow)"/>

  <!-- Inner teal glow (behind the keyhole) -->
  <rect width="512" height="512" rx="96" fill="url(#signalGlow)"/>

  <!-- Gold diamond (vault frame) — stroke thick enough to read at any size -->
  <path
    d="M256 88 L424 256 L256 424 L88 256 Z"
    stroke="url(#gold)"
    stroke-width="14"
    stroke-linejoin="round"
    fill="rgba(212,175,55,0.06)"
  />

  <!-- Inner diamond hint (subtle double-line for premium feel) -->
  <path
    d="M256 128 L384 256 L256 384 L128 256 Z"
    stroke="rgba(212,175,55,0.15)"
    stroke-width="1.5"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Teal vault keyhole — circle + rectangle = stylized keyhole -->
  <circle cx="256" cy="226" r="40" fill="url(#signal)"/>
  <rect x="237" y="226" width="38" height="78" rx="3" fill="url(#signal)"/>
</svg>
