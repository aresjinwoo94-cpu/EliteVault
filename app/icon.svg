<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!--
    EliteVault favicon — gold diamond outline + teal signal vault keyhole
    on obsidian background. Matches the brand logo (components/brand/logo.tsx)
    but with bolder strokes so it stays readable at 16x16 (the browser tab size).

    Why this file lives at /app/icon.svg (not favicon.svg):
    Next.js App Router auto-detects icon.{ico,jpg,jpeg,png,svg} in the app
    directory and injects the <link rel="icon"> tag automatically. The old
    favicon.svg name was NOT auto-detected, so the favicon wasn't actually
    being served before this change.
  -->
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#99F6E4"/>
      <stop offset="0.5" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#0D9488"/>
    </linearGradient>
    <linearGradient id="signal" x1="0" x2="1" y1="1" y2="0">
      <stop offset="0" stop-color="#5EEAD4"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="rgba(45, 212, 191,0.18)"/>
      <stop offset="1" stop-color="rgba(45, 212, 191,0)"/>
    </radialGradient>
  </defs>

  <!-- Dark obsidian background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#0A0A0F"/>
  <!-- Soft gold ambient glow behind the mark -->
  <rect width="32" height="32" rx="7" fill="url(#glow)"/>

  <!-- Gold diamond outline (vault frame) — bold stroke so it survives 16x16 -->
  <path
    d="M16 3 L29 16 L16 29 L3 16 Z"
    stroke="url(#gold)"
    stroke-width="2.2"
    stroke-linejoin="round"
    fill="rgba(45, 212, 191,0.08)"
  />

  <!-- Teal signal vault keyhole: circle + rect = a stylized keyhole shape -->
  <circle cx="16" cy="14" r="3.2" fill="url(#signal)"/>
  <rect x="14.4" y="14" width="3.2" height="6.4" fill="url(#signal)"/>
</svg>
